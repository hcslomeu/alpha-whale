services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: alpha-whale-api:latest
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - alpha-whale

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - alpha-whale

networks:
  alpha-whale:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
